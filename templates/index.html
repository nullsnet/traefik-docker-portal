<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="theme-color" content="#0d6efd">
    <title>{{ title }}</title>
    <link rel="manifest" href="/static/manifest.json?v=2">
    <link rel="apple-touch-icon" href="/static/icon-192.png">
    <link rel="icon" type="image/png" sizes="192x192" href="/static/icon-192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="/static/icon-512.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">
    <nav class="navbar navbar-light bg-white border-bottom">
        <div class="container">
            <span class="navbar-brand mb-0 h1">{{ heading }}</span>
        </div>
    </nav>

    {% if error %}
    <div class="container mt-3">
        <div class="alert alert-danger" role="alert">⚠ {{ error }}</div>
    </div>
    {% endif %}

    <div class="container py-4">
        {% if routers %}
        <table class="table table-hover">
            <thead>
                <tr>
                    <th>Service</th>
                    <th>URLs</th>
                </tr>
            </thead>
            <tbody>
                {% for svc in routers %}
                <tr>
                    <td>
                        <a href="{{ svc.urls[0] }}" target="{{ link_target }}" class="text-decoration-none">{{ svc.name }}</a>
                        {% if svc.provider != 'N/A' %}<span class="badge bg-secondary ms-2">{{ svc.provider }}</span>{% endif %}
                    </td>
                    <td>
                        {% for url in svc.urls %}
                        <div><a href="{{ url }}" target="{{ link_target }}" class="text-decoration-none">{{ url }}</a></div>
                        {% endfor %}
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
        {% else %}
        <p class="text-muted text-center">No services found.</p>
        {% endif %}
    </div>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/static/sw.js')
                    .then(reg => console.log('SW registered:', reg.scope))
                    .catch(err => console.log('SW registration failed:', err));
            });
        }
    </script>
</body>

</html>
