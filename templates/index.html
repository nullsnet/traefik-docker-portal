<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">
    <nav class="navbar navbar-light bg-white border-bottom">
        <div class="container">
            <span class="navbar-brand mb-0 h1">{{ heading }}</span>
        </div>
    </nav>

    {% if error %}
    <div class="container mt-3">
        <div class="alert alert-danger" role="alert">⚠ {{ error }}</div>
    </div>
    {% endif %}

    <div class="container py-4">
        {% if routers %}
        <table class="table table-hover">
            <thead>
                <tr>
                    <th>Service</th>
                    <th>URLs</th>
                </tr>
            </thead>
            <tbody>
                {% for svc in routers %}
                <tr>
                    <td>
                        <a href="{{ svc.urls[0] }}" target="{{ link_target }}" class="text-decoration-none">{{ svc.name }}</a>
                        {% if svc.provider != 'N/A' %}<span class="badge bg-secondary ms-2">{{ svc.provider }}</span>{% endif %}
                    </td>
                    <td>
                        {% for url in svc.urls %}
                        <div><a href="{{ url }}" target="{{ link_target }}" class="text-decoration-none">{{ url }}</a></div>
                        {% endfor %}
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
        {% else %}
        <p class="text-muted text-center">No services found.</p>
        {% endif %}
    </div>
</body>

</html>
