services:
  traefik-docker-portal:
    # image: ghcr.io/nullsnet/traefik-docker-portal:latest
    build:
      context: .
    environment:
      LINK_TARGET: _blank
      TRAEFIK_API_URL: http://traefik:8080
      DOMAIN_SUFFIX: app.nul-ls.net
      PAGE_HEADING: docker-lan - Container Service Portal 🚀
      STATIC_SERVICES_FILE: /etc/services.json
    volumes:
      - ./services.json:/etc/services.json:ro
      - ./favicon-overrides.json:/etc/favicon-overrides.json:ro
    ports:
      - 5001:5001
    networks:
      - proxy
    labels:
      traefik.enable: true
      traefik.host: portal
      traefik.http.services.portal.loadbalancer.server.port: 5001

networks:
  proxy:
    external: true
